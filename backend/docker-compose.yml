version: '3.9'

services:
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
    command: --replSet rs0   # required for change streams

  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672", "15672:15672"]

  api:
    build: .
    env_file: .env
    depends_on: [mongo, rabbitmq]
    ports: ["4000:4000"]

  nginx:
    image: nginx:alpine
    volumes: [./nginx/nginx.conf:/etc/nginx/conf.d/default.conf]
    ports: ["80:80"]
    depends_on: [api]

volumes:
  mongo_data: